name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --no-build-isolation 2>/dev/null || true
          pip install pyflakes
      - name: Syntax check
        run: |
          python -m py_compile main.py
          python -m py_compile bot/__init__.py 2>/dev/null || true
          find . -name "*.py" -exec python -m py_compile {} \;
          pyflakes . 2>&1 || true
      - name: Check for syntax errors
        run: |
          errors=$(find . -name "*.py" -exec sh -c 'python -m py_compile "$1" 2>&1' _ {} \;)
          if [ -n "$errors" ]; then
            echo "Syntax errors found:"
            echo "$errors"
            exit 1
          fi
          echo "All files pass syntax check."

  deploy:
    needs: syntax-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}' || echo "Render deploy trigger failed (non-blocking)"
      - name: Deploy via webhook (fallback)
        run: |
          curl -X POST "${{ secrets.DEPLOY_HOOK_URL }}" || echo "Webhook deploy failed (non-blocking)"
