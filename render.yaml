services:
  # Using 'web' because we serve an admin dashboard alongside the polling Telegram bot
  - type: web
    name: telegram-content-bot
    env: docker # Set to 'python' if you prefer to use the native Python environment instead of Docker
    plan: free
    
    # If using 'python' env instead of 'docker', uncomment these:
    # buildCommand: pip install -r requirements.txt
    # startCommand: python main.py

    # Environment variables that need to be set in the Render Dashboard
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: GROUP_ID
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: FIREBASE_CREDENTIALS
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false

    # To use a Persistent Disk for ChromaDB, you must be on a paid Render plan (e.g., plan: starter).
    # Uncomment the following to mount a persistent disk:
    # disk:
    #   name: chromadb-data
    #   mountPath: /app/chroma_db
    #   sizeGB: 1
